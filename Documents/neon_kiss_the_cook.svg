<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <!-- Neon Rope Light Design for "Kiss the cook" - Single continuous line -->
  <!-- Optimized for 5m rope light installation -->
  
  <!-- Main text path - single continuous line -->
  <path d="M 100 150 
          C 120 150, 140 140, 160 140 
          C 180 140, 200 150, 220 150 
          C 240 150, 260 140, 280 140 
          C 300 140, 320 150, 340 150 
          C 360 150, 380 140, 400 140 
          C 420 140, 440 150, 460 150 
          C 480 150, 500 140, 520 140 
          C 540 140, 560 150, 580 150 
          C 600 150, 620 140, 640 140 
          C 660 140, 680 150, 700 150 
          C 720 150, 740 140, 760 140 
          C 780 140, 800 150, 820 150 
          C 840 150, 860 140, 880 140 
          C 900 140, 920 150, 940 150 
          C 960 150, 980 140, 1000 140 
          C 1020 140, 1040 150, 1060 150 
          C 1080 150, 1100 140, 1120 140 
          C 1140 140, 1160 150, 1180 150" 
        stroke="#FF00FF" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Guide lines for installation (optional) -->
  <path d="M 100 150 L 1180 150" stroke="#888888" stroke-width="1" stroke-dasharray="5,5" fill="none"/>
  
  <!-- Dimensions and spacing notes -->
  <text x="100" y="180" font-family="Arial" font-size="12" fill="#666666">Total Length: ~5m</text>
  <text x="100" y="195" font-family="Arial" font-size="12" fill="#666666">Recommended for 5m Neon Rope Light</text>
</svg>